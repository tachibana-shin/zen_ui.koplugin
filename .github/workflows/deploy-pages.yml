name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '*.md'
      - '_config.yml'
      - '_includes/**'
      - 'images/**'
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage site files
        run: |
          mkdir -p _stage/_includes _stage/locales
          cp *.md _stage/
          cp _config.yml _stage/
          cp _includes/head-custom.html _stage/_includes/
          cp _includes/dark-mode.css _stage/_includes/
          cp locales/README.md _stage/locales/
          cp -r images _stage/
          cp -r icons _stage/
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_stage
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
